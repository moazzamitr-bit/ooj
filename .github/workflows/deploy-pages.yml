name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Supabase — کلید anon عمومی است و در build زمان GitHub Pages تزریق می‌شود
  NEXT_PUBLIC_SUPABASE_URL: https://bnjvjrsagsrqnkvvjlvv.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuanZqcnNhZ3NycW5rdnZqbHZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNjYxMDgsImV4cCI6MjA5ODk0MjEwOH0.HoukvvwbgYqT8i1xg6b_mF-Ru3i15D45P8Q0DMytsCk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static site (Supabase client-side)
        run: npm run build:pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
